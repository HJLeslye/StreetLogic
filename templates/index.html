<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteerLogic Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; }
        .video-container { border: 5px solid #00ffcc; border-radius: 15px; overflow: hidden; box-shadow: 0 0 20px #00ffcc; }
        .status-card { background: #2d2d2d; border-radius: 10px; padding: 20px; }
    </style>
</head>
<body>
    <div class="container mt-5 text-center">
        <h1 class="mb-4">StreetLogic: Control de Vía</h1>
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="video-container">
                    <img src="{{ url_for('video_feed') }}" width="100%">
                </div>
                <div class="status-card mt-4">
                    <h3>Estado del Sistema: <span class="text-success">ACTIVO</span></h3>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
